name: E2E Tests (CF Preview)

on:
  check_run:
    types: [completed]

jobs:
  # Clear pending E2E status for production builds (no preview alias) on PRs
  e2e-skipped:
    name: E2E Skipped Status
    runs-on: ubicloud-standard-2
    permissions:
      statuses: write
    if: |
      github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
      github.event.check_run.conclusion == 'success' &&
      !contains(github.event.check_run.output.summary || '', 'Preview Alias URL') &&
      github.event.check_run.pull_requests[0]
    steps:
      - name: Clear pending E2E status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.check_run.head_sha }} \
            -f state=success \
            -f context="E2E Tests" \
            -f description="Skipped (production build, no preview)"

  e2e-tests:
    name: E2E Tests
    runs-on: ubicloud-standard-2
    permissions:
      statuses: write
      contents: read
    # Only run on successful CF Workers preview builds (production builds lack Preview Alias URL)
    if: |
      github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
      github.event.check_run.conclusion == 'success' &&
      contains(github.event.check_run.output.summary || '', 'Preview Alias URL')
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      AUTH_E2E_TEST_SECRET: ${{ secrets.AUTH_E2E_TEST_SECRET }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.check_run.head_sha }}

      - name: Extract preview URL
        run: |
          SUMMARY="${{ github.event.check_run.output.summary }}"
          PREVIEW_URL=$(echo "$SUMMARY" | grep 'Preview Alias URL:' | sed 's/.*Preview Alias URL: //' | tr -d '[:space:]')
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::No Preview Alias URL found in check_run output"
            exit 1
          fi
          echo "PREVIEW_URL=${PREVIEW_URL}" >> "$GITHUB_ENV"
          echo "Preview URL: ${PREVIEW_URL}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright
        run: bunx playwright install chromium --with-deps

      - name: Fetch E2E config from preview
        run: |
          echo "Fetching config from: ${PREVIEW_URL}/.well-known/e2e-config.json"

          HEADERS=""
          if [ -n "$CF_ACCESS_CLIENT_ID" ]; then
            HEADERS="-H CF-Access-Client-Id:$CF_ACCESS_CLIENT_ID -H CF-Access-Client-Secret:$CF_ACCESS_CLIENT_SECRET"
          fi

          CONFIG=$(curl -sf $HEADERS "${PREVIEW_URL}/.well-known/e2e-config.json")

          echo "Config fetched successfully"
          echo "$CONFIG" | jq .

          echo "PUBLIC_CONVEX_URL=$(echo "$CONFIG" | jq -r '.convexUrl')" >> "$GITHUB_ENV"
          echo "PUBLIC_CONVEX_SITE_URL=$(echo "$CONFIG" | jq -r '.convexSiteUrl')" >> "$GITHUB_ENV"
          echo "PUBLIC_SITE_URL=${PREVIEW_URL}" >> "$GITHUB_ENV"

      - name: Wait for Convex backend readiness
        run: |
          echo "Waiting for Convex backend at: ${PUBLIC_CONVEX_URL}"
          for i in $(seq 1 12); do
            if curl -sf --connect-timeout 5 --max-time 10 "${PUBLIC_CONVEX_URL}" > /dev/null; then
              echo "Convex backend is ready (attempt $i)"
              exit 0
            fi
            echo "Not ready yet (attempt $i/12), waiting 5s..."
            [ "$i" -lt 12 ] && sleep 5
          done
          echo "::error::Convex backend not ready after 60s: ${PUBLIC_CONVEX_URL}"
          exit 1

      - name: Log test configuration
        run: |
          echo "Testing against CF preview deployment:"
          echo "  PREVIEW_URL: $PREVIEW_URL"
          echo "  PUBLIC_CONVEX_URL: $PUBLIC_CONVEX_URL"
          echo "  PUBLIC_CONVEX_SITE_URL: $PUBLIC_CONVEX_SITE_URL"

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: playwright-report/

      - name: Report status to PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in 1 2 3; do
            gh api repos/${{ github.repository }}/statuses/${{ github.event.check_run.head_sha }} \
              -f state=${{ job.status == 'success' && 'success' || 'failure' }} \
              -f context="E2E Tests" \
              -f description="E2E Tests (CF Preview)" \
              -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Failed to report status after 3 attempts"
          exit 1
