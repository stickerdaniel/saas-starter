name: E2E Tests (Vercel Preview)

on:
  deployment_status:

# Least-privilege default; jobs that post commit statuses override with
# statuses: write at the job level.
permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubicloud-standard-2
    permissions:
      statuses: write
      contents: read
    # Only run on successful Vercel preview deployments
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      AUTH_E2E_TEST_SECRET: ${{ secrets.AUTH_E2E_TEST_SECRET }}
      PREVIEW_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      # Preview URL from deployment event
      PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright
        run: bunx playwright install chromium --with-deps

      - name: Fetch E2E config from preview
        id: config
        run: |
          CONFIG_URL="${PREVIEW_URL}/.well-known/e2e-config.json"
          echo "Fetching config from: $CONFIG_URL"

          # Use preview bypass for protected deployments
          BYPASS_HEADER=""
          if [ -n "$PREVIEW_BYPASS_SECRET" ]; then
            BYPASS_HEADER="-H x-vercel-protection-bypass:${PREVIEW_BYPASS_SECRET}"
            echo "Using preview bypass"
          fi

          # Retry up to 5 times (deployment might take a moment to be fully ready)
          for i in {1..5}; do
            # Intentional word splitting for optional -H arg
            # shellcheck disable=SC2086
            if CONFIG=$(curl -sf $BYPASS_HEADER "$CONFIG_URL"); then
              echo "Config fetched successfully"
              echo "$CONFIG" | jq .

              # Extract values and set as env vars
              {
                echo "PUBLIC_CONVEX_URL=$(echo "$CONFIG" | jq -r '.convexUrl')"
                echo "PUBLIC_CONVEX_SITE_URL=$(echo "$CONFIG" | jq -r '.convexSiteUrl')"
                echo "PUBLIC_SITE_URL=${PREVIEW_URL}"
              } >> "$GITHUB_ENV"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "::error::Failed to fetch E2E config after 5 attempts"
          exit 1

      - name: Log test configuration
        run: |
          echo "Testing against preview deployment:"
          echo "  PREVIEW_URL: $PREVIEW_URL"
          echo "  PUBLIC_CONVEX_URL: $PUBLIC_CONVEX_URL"
          echo "  PUBLIC_CONVEX_SITE_URL: $PUBLIC_CONVEX_SITE_URL"

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/

      - name: Report status to PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.deployment.sha }}
        run: |
          for i in 1 2 3; do
            gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
              -f state=${{ job.status == 'success' && 'success' || 'failure' }} \
              -f context="E2E Tests" \
              -f description="E2E Tests (Vercel Preview)" \
              -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Failed to report status after 3 attempts"
          exit 1

  # Resolve the required E2E status when the Vercel preview deployment fails.
  # Without this, the pending status set by static-checks.yml would stay
  # pending forever and block merging on this SHA.
  e2e-deploy-failed:
    name: E2E Deploy Failed Status
    runs-on: ubicloud-standard-2
    permissions:
      statuses: write
    # deployment_status also fires for pending/in_progress/queued, so gate on
    # explicit terminal failure states only
    if: |
      github.event.deployment_status.environment == 'Preview' &&
      (github.event.deployment_status.state == 'failure' || github.event.deployment_status.state == 'error')
    steps:
      - name: Report deploy failure to PR
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.deployment.sha }}
          DEPLOY_STATE: ${{ github.event.deployment_status.state }}
          TARGET_URL: ${{ github.event.deployment_status.target_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}
        run: |
          for i in 1 2 3; do
            gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
              -f state=failure \
              -f context="E2E Tests" \
              -f description="Vercel preview deploy ${DEPLOY_STATE}, E2E skipped" \
              -f target_url="$TARGET_URL" \
              && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Failed to report status after 3 attempts"
          exit 1
