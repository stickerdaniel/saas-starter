name: Static Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: 'stable'
      - run: go install github.com/client9/misspell/cmd/misspell@latest
      - run: bun install
      - run: bun scripts/static-checks.ts --ci --scope lint

  typecheck:
    name: Type Check
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun scripts/static-checks.ts --ci --scope types

  e2e-pending:
    name: E2E Pending Status
    runs-on: ubicloud-standard-2
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      statuses: write
    steps:
      - name: Set pending E2E status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f context="E2E Tests" \
            -f description="Waiting for CF Workers preview deployment..."

  unit-tests:
    name: Unit Tests
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun run test:unit
