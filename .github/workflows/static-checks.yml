name: Static Checks

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for all jobs; e2e-pending overrides with
# statuses: write at the job level.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: 'stable'
      - run: go install github.com/client9/misspell/cmd/misspell@latest
      - run: bun install
      - run: bun scripts/static-checks.ts --ci --scope lint

  typecheck:
    name: Type Check
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun scripts/static-checks.ts --ci --scope types

  e2e-pending:
    name: E2E Pending Status
    runs-on: ubicloud-standard-2
    # Skip on fork PRs: the pull_request token is read-only for forks, so
    # writing a commit status returns 403. Fork E2E status is set by the
    # gated preview workflow instead.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      statuses: write
    steps:
      - name: Set pending E2E status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f context="E2E Tests" \
            -f description="Waiting for CF Workers preview deployment..."

  unit-tests:
    name: Unit Tests
    runs-on: ubicloud-standard-2
    env:
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bun run test:unit
