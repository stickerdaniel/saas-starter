name: Actionlint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint Workflows
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          # Log-only reporter: needs no write permissions and works on both
          # pull_request and push events. fail_level makes findings fail the job
          # instead of only annotating.
          reporter: github-annotations
          filter_mode: nofilter
          fail_level: error
